name: Deploy Android

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
          cache: true

      - name: Create .env.prod
        run: |
          echo "API_BASE_URL=${{ secrets.API_BASE_URL }}" >> .env.prod
          echo "AI_API_BASE_URL=${{ secrets.AI_API_BASE_URL }}" >> .env.prod
          echo "ANALYTICS_ENABLED=true" >> .env.prod
          echo "SENTRY_DSN=${{ secrets.SENTRY_DSN }}" >> .env.prod
          echo "ENVIRONMENT=prod" >> .env.prod

      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      - name: Create key.properties
        run: |
          echo "storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" >> android/key.properties
          echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=upload-keystore.jks" >> android/key.properties

      - name: Install dependencies
        run: flutter pub get

      - name: Build App Bundle
        run: flutter build appbundle --release

      - name: Upload to Play Store
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.iotecksolutions.todoapp
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal
